# Dedicated read-only file origin for uploaded assets.
# Only /srv/uploads/public is exposed as /files/; tmp upload files stay private.

worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;

  sendfile on;
  etag on;

  server {
    listen 8080;
    server_name files.oacex.com;

    location = /files {
      return 301 /files/;
    }

    location /files/ {
      alias /srv/uploads/public/;
      autoindex off;
      try_files $uri =404;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
      add_header Access-Control-Allow-Origin "*" always;
      add_header X-Content-Type-Options "nosniff";
    }

    location / {
      return 404;
    }
  }
}
