<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 双用户聊天测试工具</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 顶部配置栏 */
        .header {
            background: white;
            border-bottom: 1px solid #e8e8e8;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .header h1 {
            font-size: 18px;
            color: #333;
            margin-right: 20px;
        }
        
        .config-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .config-item label {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
        }
        
        .config-item input {
            padding: 6px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            width: 180px;
        }
        
        .config-item input:focus {
            border-color: #1890ff;
            outline: none;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        /* 用户面板 */
        .user-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e8e8e8;
            background: white;
        }
        
        .user-panel:last-child {
            border-right: none;
        }
        
        .user-panel.user-a {
            background: #f6ffed;
        }
        
        .user-panel.user-b {
            background: #e6f7ff;
        }
        
        /* 用户头部 */
        .user-header {
            padding: 16px;
            border-bottom: 1px solid #e8e8e8;
            background: white;
        }
        
        .user-header h2 {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .user-a .user-badge {
            background: #52c41a;
            color: white;
        }
        
        .user-b .user-badge {
            background: #1890ff;
            color: white;
        }
        
        .user-config {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .user-config input {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .user-config input:focus {
            outline: none;
        }
        
        .user-a .user-config input:focus {
            border-color: #52c41a;
        }
        
        .user-b .user-config input:focus {
            border-color: #1890ff;
        }
        
        .user-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .btn-connect-a {
            background: #52c41a;
            color: white;
        }
        
        .btn-connect-a:hover {
            background: #73d13d;
        }
        
        .btn-connect-b {
            background: #1890ff;
            color: white;
        }
        
        .btn-connect-b:hover {
            background: #40a9ff;
        }
        
        .btn-disconnect {
            background: #ff4d4f;
            color: white;
        }
        
        .btn-disconnect:hover {
            background: #ff7875;
        }
        
        .btn-default {
            background: white;
            color: #333;
            border: 1px solid #d9d9d9;
        }
        
        .btn-default:hover {
            border-color: #1890ff;
            color: #1890ff;
        }
        
        .status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-disconnected {
            background: #ffccc7;
            color: #cf1322;
        }
        
        .status-connected {
            background: #d9f7be;
            color: #389e0d;
        }
        
        .status-connecting {
            background: #fff1b8;
            color: #d48806;
        }
        
        /* 会话操作区 */
        .conversation-section {
            padding: 12px 16px;
            border-bottom: 1px solid #e8e8e8;
            background: white;
        }
        
        .conversation-section h3 {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .create-conv-row {
            display: flex;
            gap: 8px;
        }
        
        .create-conv-row input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .conversation-list {
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .conversation-item {
            padding: 10px;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        
        .conversation-item:hover {
            border-color: #1890ff;
            background: #f0faff;
        }
        
        .user-a .conversation-item.active {
            border-color: #52c41a;
            background: #f6ffed;
        }
        
        .user-b .conversation-item.active {
            border-color: #1890ff;
            background: #e6f7ff;
        }
        
        .conv-title {
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .conv-info {
            font-size: 11px;
            color: #999;
        }
        
        /* 聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .message {
            display: flex;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.own {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            color: white;
            margin: 0 10px;
            flex-shrink: 0;
        }
        
        .user-a .message-avatar {
            background: #52c41a;
        }
        
        .user-b .message-avatar {
            background: #1890ff;
        }
        
        .message-content {
            max-width: 70%;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 2px;
            font-size: 11px;
            color: #999;
        }
        
        .message.own .message-header {
            flex-direction: row-reverse;
        }
        
        .message-bubble {
            padding: 10px 14px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-break: break-word;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .message.own .message-bubble {
            background: #95ec69;
        }
        
        .message-system {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 12px 0;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        
        /* 输入区域 */
        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid #e8e8e8;
            background: white;
        }
        
        .chat-input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            resize: none;
            height: 40px;
            font-family: inherit;
        }
        
        .chat-input:focus {
            outline: none;
        }
        
        .user-a .chat-input:focus {
            border-color: #52c41a;
        }
        
        .user-b .chat-input:focus {
            border-color: #1890ff;
        }
        
        .btn-send {
            padding: 0 20px;
            height: 40px;
        }
        
        .user-a .btn-send {
            background: #52c41a;
            color: white;
        }
        
        .user-a .btn-send:hover {
            background: #73d13d;
        }
        
        .user-b .btn-send {
            background: #1890ff;
            color: white;
        }
        
        .user-b .btn-send:hover {
            background: #40a9ff;
        }
        
        /* 底部日志 */
        .log-panel {
            height: 120px;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            overflow-y: auto;
            border-top: 1px solid #333;
        }
        
        .log-entry {
            margin-bottom: 2px;
            padding: 1px 0;
        }
        
        .log-time {
            color: #858585;
        }
        
        .log-sent { color: #7ee787; }
        .log-received { color: #79c0ff; }
        .log-error { color: #ffa198; }
        .log-system { color: #d2a8ff; }
        .log-user-a { color: #95de64; }
        .log-user-b { color: #69c0ff; }
        
        /* 快捷操作 */
        .quick-actions {
            padding: 10px 16px;
            background: #fafafa;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .quick-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- 顶部配置栏 -->
    <div class="header">
        <h1>🔌 WebSocket 双用户聊天测试</h1>
        <div class="config-item">
            <label>HTTP API:</label>
            <input type="text" id="httpBaseUrl" value="http://localhost:8081" placeholder="http://localhost:8081">
        </div>
        <div class="config-item">
            <label>WebSocket:</label>
            <input type="text" id="wsUrl" value="ws://localhost:8081/message" placeholder="ws://localhost:8081/message">
        </div>
        <button class="btn-default" onclick="quickSetup()">⚡ 快速设置</button>
        <button class="btn-default" onclick="clearAllLogs()">清空日志</button>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 用户 A 面板 -->
        <div class="user-panel user-a">
            <div class="user-header">
                <h2>
                    <span class="user-badge">用户 A</span>
                    <span id="statusA" class="status status-disconnected">未连接</span>
                </h2>
                <div class="user-config">
                    <input type="text" id="tokenA" placeholder="用户A的 Access Token">
                    <input type="text" id="userIdA" placeholder="用户A的 ID" readonly>
                    <div class="user-actions">
                        <button class="btn-connect-a" onclick="connectUser('A')">连接</button>
                        <button class="btn-disconnect" onclick="disconnectUser('A')">断开</button>
                    </div>
                </div>
            </div>
            
            <div class="conversation-section">
                <h3>创建会话</h3>
                <div class="create-conv-row">
                    <input type="number" id="targetUserIdA" placeholder="对方用户ID">
                    <button class="btn-default" onclick="createConversation('A')">创建</button>
                </div>
                <div class="conversation-list" id="convListA">
                    <div style="color: #999; font-size: 12px; padding: 10px;">暂无会话</div>
                </div>
            </div>
            
            <div class="chat-area">
                <div class="chat-messages" id="messagesA">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                        </svg>
                        <p>连接后开始聊天</p>
                    </div>
                </div>
                
                <div class="quick-actions">
                    <button onclick="loadConversations('A')">刷新会话</button>
                    <button onclick="clearMessages('A')">清空消息</button>
                </div>
                
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <textarea 
                            id="inputA" 
                            class="chat-input" 
                            placeholder="输入消息..."
                            onkeydown="handleInputKeydown(event, 'A')"
                        ></textarea>
                        <button class="btn-send" onclick="sendMessage('A')">发送</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户 B 面板 -->
        <div class="user-panel user-b">
            <div class="user-header">
                <h2>
                    <span class="user-badge">用户 B</span>
                    <span id="statusB" class="status status-disconnected">未连接</span>
                </h2>
                <div class="user-config">
                    <input type="text" id="tokenB" placeholder="用户B的 Access Token">
                    <input type="text" id="userIdB" placeholder="用户B的 ID" readonly>
                    <div class="user-actions">
                        <button class="btn-connect-b" onclick="connectUser('B')">连接</button>
                        <button class="btn-disconnect" onclick="disconnectUser('B')">断开</button>
                    </div>
                </div>
            </div>
            
            <div class="conversation-section">
                <h3>创建会话</h3>
                <div class="create-conv-row">
                    <input type="number" id="targetUserIdB" placeholder="对方用户ID">
                    <button class="btn-default" onclick="createConversation('B')">创建</button>
                </div>
                <div class="conversation-list" id="convListB">
                    <div style="color: #999; font-size: 12px; padding: 10px;">暂无会话</div>
                </div>
            </div>
            
            <div class="chat-area">
                <div class="chat-messages" id="messagesB">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                        </svg>
                        <p>连接后开始聊天</p>
                    </div>
                </div>
                
                <div class="quick-actions">
                    <button onclick="loadConversations('B')">刷新会话</button>
                    <button onclick="clearMessages('B')">清空消息</button>
                </div>
                
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <textarea 
                            id="inputB" 
                            class="chat-input" 
                            placeholder="输入消息..."
                            onkeydown="handleInputKeydown(event, 'B')"
                        ></textarea>
                        <button class="btn-send" onclick="sendMessage('B')">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部日志 -->
    <div class="log-panel" id="logPanel"></div>

    <script>
        // 存储两个用户的连接状态
        const users = {
            A: { socket: null, userId: null, conversations: [], currentConv: null },
            B: { socket: null, userId: null, conversations: [], currentConv: null }
        };

        // 日志功能
        function log(type, message, data) {
            const logPanel = document.getElementById('logPanel');
            const time = new Date().toLocaleTimeString();
            let className = 'log-system';
            let prefix = 'ℹ️';
            
            switch(type) {
                case 'sent': className = 'log-sent'; prefix = '📤'; break;
                case 'received': className = 'log-received'; prefix = '📥'; break;
                case 'error': className = 'log-error'; prefix = '❌'; break;
                case 'system': className = 'log-system'; prefix = 'ℹ️'; break;
                case 'userA': className = 'log-user-a'; prefix = '🟢[A]'; break;
                case 'userB': className = 'log-user-b'; prefix = '🔵[B]'; break;
            }

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            let html = `<span class="log-time">[${time}]</span> <span class="${className}">${prefix} ${message}</span>`;
            if (data) {
                html += ` <code>${JSON.stringify(data).substring(0, 200)}</code>`;
            }
            entry.innerHTML = html;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function clearAllLogs() {
            document.getElementById('logPanel').innerHTML = '';
        }

        // 获取配置
        function getConfig() {
            const httpBaseUrl = document.getElementById('httpBaseUrl').value.trim();
            const wsUrl = document.getElementById('wsUrl').value.trim();
            return { httpBaseUrl, wsUrl };
        }

        // 解析 Token 获取用户ID
        function parseUserId(token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return Number(payload.sub);
            } catch (e) {
                return null;
            }
        }

        // 更新状态显示
        function updateStatus(userLabel, status) {
            const statusEl = document.getElementById(`status${userLabel}`);
            statusEl.className = 'status';
            
            switch(status) {
                case 'connected':
                    statusEl.classList.add('status-connected');
                    statusEl.textContent = '已连接';
                    break;
                case 'connecting':
                    statusEl.classList.add('status-connecting');
                    statusEl.textContent = '连接中...';
                    break;
                default:
                    statusEl.classList.add('status-disconnected');
                    statusEl.textContent = '未连接';
            }
        }

        // 连接用户
        function connectUser(userLabel) {
            const { wsUrl } = getConfig();
            const tokenInput = document.getElementById(`token${userLabel}`);
            const userIdInput = document.getElementById(`userId${userLabel}`);
            let token = tokenInput.value.trim();
            
            if (!wsUrl || !token) {
                alert(`请填写 WebSocket 地址和用户${userLabel}的 Token`);
                return;
            }

            // 移除 Bearer 前缀
            if (token.startsWith('Bearer ')) {
                token = token.slice(7);
            }

            // 解析用户ID
            const userId = parseUserId(token);
            if (!userId) {
                alert('Token 格式错误，无法解析用户ID');
                return;
            }

            users[userLabel].userId = userId;
            userIdInput.value = userId;

            updateStatus(userLabel, 'connecting');
            log(`user${userLabel}`, `用户${userLabel}(${userId}) 正在连接...`);

            // 断开旧连接
            if (users[userLabel].socket) {
                users[userLabel].socket.disconnect();
            }

            // 创建新连接
            users[userLabel].socket = io(wsUrl, {
                transports: ['websocket', 'polling'],
                auth: { token }
            });

            const socket = users[userLabel].socket;

            socket.on('connect', () => {
                updateStatus(userLabel, 'connected');
                log(`user${userLabel}`, `用户${userLabel}(${userId}) 连接成功`);
                
                // 设置对方的默认目标ID
                const otherLabel = userLabel === 'A' ? 'B' : 'A';
                if (users[otherLabel].userId) {
                    document.getElementById(`targetUserId${userLabel}`).value = users[otherLabel].userId;
                }
                
                loadConversations(userLabel);
            });

            socket.on('disconnect', (reason) => {
                updateStatus(userLabel, 'disconnected');
                log(`user${userLabel}`, `用户${userLabel} 断开: ${reason}`);
            });

            socket.on('connect_error', (error) => {
                updateStatus(userLabel, 'disconnected');
                log(`user${userLabel}`, `用户${userLabel} 连接错误: ${error.message}`, 'error');
            });

            // 监听消息事件
            socket.on('chat.ack', (data) => {
                log(`user${userLabel}`, `chat.ack`, data);
                if (data.code !== 0) {
                    addSystemMessage(userLabel, `发送失败: ${data.message}`);
                }
            });

            socket.on('chat.message.new', (data) => {
                log(`user${userLabel}`, `chat.message.new`, data);
                if (data.message) {
                    const msg = data.message;
                    const isOwn = msg.senderId === users[userLabel].userId;
                    addMessage(userLabel, msg.senderId, msg.content, isOwn, new Date(msg.createdAt));
                }
            });

            socket.on('chat.conversation.update', (data) => {
                log(`user${userLabel}`, `chat.conversation.update`, data);
            });
        }

        // 断开用户
        function disconnectUser(userLabel) {
            if (users[userLabel].socket) {
                users[userLabel].socket.disconnect();
                users[userLabel].socket = null;
            }
            users[userLabel].userId = null;
            users[userLabel].conversations = [];
            users[userLabel].currentConv = null;
            document.getElementById(`userId${userLabel}`).value = '';
            updateStatus(userLabel, 'disconnected');
            log(`user${userLabel}`, `用户${userLabel} 已断开`);
        }

        // 创建会话
        async function createConversation(userLabel) {
            const { httpBaseUrl } = getConfig();
            const token = document.getElementById(`token${userLabel}`).value.trim();
            const targetUserId = document.getElementById(`targetUserId${userLabel}`).value;
            
            if (!httpBaseUrl || !token) {
                alert('请填写 HTTP API 地址和 Token');
                return;
            }
            
            if (!targetUserId) {
                alert('请填写对方用户ID');
                return;
            }

            try {
                log(`user${userLabel}`, `用户${userLabel} 正在创建与用户${targetUserId}的会话...`);
                
                const response = await fetch(`${httpBaseUrl}/api/app/message/chat/direct/open`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ targetUserId: Number(targetUserId) })
                });

                const data = await response.json();
                
                if (response.ok) {
                    log(`user${userLabel}`, `用户${userLabel} 会话创建成功`, data);
                    users[userLabel].currentConv = data;
                    selectConversation(userLabel, data);
                    loadConversations(userLabel);
                    addSystemMessage(userLabel, `已创建与用户 ${targetUserId} 的会话`);
                } else {
                    log(`user${userLabel}`, `用户${userLabel} 创建会话失败`, data);
                    alert('创建会话失败: ' + (data.message || '未知错误'));
                }
            } catch (error) {
                log(`user${userLabel}`, `用户${userLabel} 请求失败: ${error.message}`, 'error');
                alert('请求失败: ' + error.message);
            }
        }

        // 加载会话列表
        async function loadConversations(userLabel) {
            const { httpBaseUrl } = getConfig();
            const token = document.getElementById(`token${userLabel}`).value.trim();
            
            if (!httpBaseUrl || !token) return;

            try {
                const response = await fetch(`${httpBaseUrl}/api/app/message/chat/conversation/list?pageIndex=1&pageSize=20`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                
                if (response.ok && data.list) {
                    users[userLabel].conversations = data.list;
                    renderConversationList(userLabel);
                }
            } catch (error) {
                log(`user${userLabel}`, `用户${userLabel} 加载会话失败: ${error.message}`, 'error');
            }
        }

        // 渲染会话列表
        function renderConversationList(userLabel) {
            const container = document.getElementById(`convList${userLabel}`);
            const conversations = users[userLabel].conversations;
            
            if (conversations.length === 0) {
                container.innerHTML = '<div style="color: #999; font-size: 12px; padding: 10px;">暂无会话</div>';
                return;
            }

            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item ${users[userLabel].currentConv?.id === conv.id ? 'active' : ''}" 
                     onclick="selectConversation('${userLabel}', ${conv.id})">
                    <div class="conv-title">用户 ${conv.peerUser?.nickname || conv.peerUser?.id || '未知'}</div>
                    <div class="conv-info">会话ID: ${conv.id} | 未读: ${conv.unreadCount}</div>
                </div>
            `).join('');
        }

        // 选择会话
        function selectConversation(userLabel, convOrId) {
            let conv;
            if (typeof convOrId === 'number') {
                conv = users[userLabel].conversations.find(c => c.id === convOrId);
            } else {
                conv = convOrId;
            }
            
            if (!conv) return;
            
            users[userLabel].currentConv = conv;
            renderConversationList(userLabel);
            clearMessages(userLabel);
            addSystemMessage(userLabel, `已进入会话 ${conv.id}`);
            
            // 加载历史消息
            loadMessages(userLabel, conv.id);
        }

        // 加载历史消息
        async function loadMessages(userLabel, conversationId) {
            const { httpBaseUrl } = getConfig();
            const token = document.getElementById(`token${userLabel}`).value.trim();
            
            try {
                const response = await fetch(
                    `${httpBaseUrl}/api/app/message/chat/conversation/messages?conversationId=${conversationId}&limit=20`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );

                const data = await response.json();
                
                if (response.ok && data.list) {
                    data.list.reverse().forEach(msg => {
                        const isOwn = msg.senderId === users[userLabel].userId;
                        addMessage(userLabel, msg.senderId, msg.content, isOwn, new Date(msg.createdAt));
                    });
                }
            } catch (error) {
                log(`user${userLabel}`, `用户${userLabel} 加载消息失败: ${error.message}`, 'error');
            }
        }

        // 发送消息
        function sendMessage(userLabel) {
            const user = users[userLabel];
            
            if (!user.socket || !user.socket.connected) {
                alert(`用户${userLabel} 未连接`);
                return;
            }
            
            if (!user.currentConv) {
                alert(`用户${userLabel} 请先创建或选择会话`);
                return;
            }

            const input = document.getElementById(`input${userLabel}`);
            const content = input.value.trim();
            
            if (!content) return;

            const message = {
                requestId: `req-${userLabel}-${Date.now()}`,
                timestamp: Date.now(),
                payload: {
                    conversationId: user.currentConv.id,
                    messageType: 1,
                    content: content,
                    clientMessageId: `client-${userLabel}-${Date.now()}`
                }
            };

            user.socket.emit('chat.send', message);
            log(`user${userLabel}`, `用户${userLabel} 发送消息`, message);
            
            // 添加到界面
            addMessage(userLabel, user.userId, content, true);
            
            input.value = '';
        }

        // 添加消息到界面
        function addMessage(userLabel, senderId, content, isOwn, time = new Date()) {
            const container = document.getElementById(`messages${userLabel}`);
            
            // 清除空状态
            if (container.querySelector('.empty-state')) {
                container.innerHTML = '';
            }

            const timeStr = time.toLocaleTimeString();
            const initial = String(senderId).charAt(0).toUpperCase();
            
            const messageEl = document.createElement('div');
            messageEl.className = `message ${isOwn ? 'own' : ''}`;
            messageEl.innerHTML = `
                <div class="message-avatar">${initial}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span>用户 ${senderId}</span>
                        <span style="margin: 0 8px;">·</span>
                        <span>${timeStr}</span>
                    </div>
                    <div class="message-bubble">${escapeHtml(content)}</div>
                </div>
            `;
            
            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }

        // 添加系统消息
        function addSystemMessage(userLabel, text) {
            const container = document.getElementById(`messages${userLabel}`);
            
            if (container.querySelector('.empty-state')) {
                container.innerHTML = '';
            }

            const messageEl = document.createElement('div');
            messageEl.className = 'message-system';
            messageEl.textContent = text;
            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }

        // 清空消息
        function clearMessages(userLabel) {
            document.getElementById(`messages${userLabel}`).innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                    <p>连接后开始聊天</p>
                </div>
            `;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 处理输入框回车
        function handleInputKeydown(event, userLabel) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage(userLabel);
            }
        }

        // 快速设置
        function quickSetup() {
            // 示例：设置用户A为1，用户B为5
            const tokenA = prompt('请输入用户 A (如用户1) 的 Token:');
            if (tokenA) {
                document.getElementById('tokenA').value = tokenA;
                const userIdA = parseUserId(tokenA);
                if (userIdA) {
                    document.getElementById('targetUserIdB').value = userIdA;
                }
            }
            
            const tokenB = prompt('请输入用户 B (如用户5) 的 Token:');
            if (tokenB) {
                document.getElementById('tokenB').value = tokenB;
                const userIdB = parseUserId(tokenB);
                if (userIdB) {
                    document.getElementById('targetUserIdA').value = userIdB;
                }
            }
            
            log('system', '快速设置完成，请点击连接按钮');
        }

        // 页面加载
        window.onload = () => {
            log('system', '页面加载完成，请配置 Token 后连接');
        };
    </script>
</body>
</html>
