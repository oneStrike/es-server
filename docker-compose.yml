services:
  # Admin API 后端服务
  admin-server:
    image: es/admin/server:${SERVER_VERSION}
    container_name: es-admin-server
    # 强制只使用本地镜像，不拉取
    pull_policy: never
    user: '1001:1001'
    # 使用 Docker 内置 tini 作为 PID 1，负责信号转发与僵尸进程回收
    init: true
    restart: unless-stopped
    # 日志轮转
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    # 依赖迁移服务
    depends_on:
      migrator:
        condition: service_completed_successfully
    # 安全选项
    security_opt:
      - no-new-privileges:true
    expose:
      - '8080'
    ports:
      - '127.0.0.1:${ADMIN_API_PORT:-8080}:8080'
    env_file:
      - ./.env
    environment:
      # 注入当前服务特定的配置
      - APP_NAME=admin-api
      # 如果代码中没有处理 DATABASE_URL 组合逻辑，则需在此显式声明
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      # 配置隔离映射
      - JWT_EXPIRATION_IN=${ADMIN_JWT_EXPIRATION_IN}
      - JWT_REFRESH_EXPIRATION_IN=${ADMIN_JWT_REFRESH_EXPIRATION_IN}
      - JWT_JWT_AUD=${ADMIN_JWT_JWT_AUD}
      - JWT_JWT_ISSUER=${ADMIN_JWT_ISSUER}
      - REDIS_NAMESPACE=${ADMIN_REDIS_NAMESPACE}
      - UPLOAD_LOCAL_DIR=${UPLOAD_LOCAL_DIR:-/app/uploads/public}
      - UPLOAD_TMP_DIR=${UPLOAD_TMP_DIR:-/app/uploads/tmp}
      - UPLOAD_LOCAL_URL_PREFIX=${UPLOAD_LOCAL_URL_PREFIX:-/files}
      - UPLOAD_MAX_FILE_SIZE=${ADMIN_UPLOAD_MAX_FILE_SIZE}
      # 日志路径 (区分项目)
      - LOG_PATH=/app/logs/app
      # 控制台日志级别
      - LOG_CONSOLE_LEVEL=${LOG_CONSOLE_LEVEL}
    volumes:
      # 挂载运行时持久目录
      - ${HOST_UPLOADS_DIR:-es-server-uploads}:/app/uploads
      - ${HOST_LOGS_DIR:-es-server-logs}:/app/logs
      - ${HOST_ADMIN_SECRETS_DIR:-es-admin-server-secrets}:/app/secrets
      - /tmp # 使用匿名卷挂载临时目录，避免写入容器层
    networks:
      - 1panel-network # 使用外部网络，确保 DNS 解析稳定

  # 数据库迁移服务
  migrator:
    image: es/app/server:${SERVER_VERSION}
    container_name: es-migrator
    pull_policy: never
    user: '1001:1001'
    # 覆盖默认启动命令，执行生产环境离线迁移脚本
    command: [bun, run, db:migrate:prod]
    # 任务执行完成后退出，不重启
    restart: no
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - 1panel-network

  # App API 后端服务
  app-server:
    image: es/app/server:${SERVER_VERSION}
    container_name: es-app-server
    # 强制只使用本地镜像，不拉取
    pull_policy: never
    user: '1001:1001'
    # 使用 Docker 内置 tini 作为 PID 1，负责信号转发与僵尸进程回收
    init: true
    restart: unless-stopped
    # 日志轮转
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    # 依赖迁移服务
    depends_on:
      migrator:
        condition: service_completed_successfully
    # 安全选项
    security_opt:
      - no-new-privileges:true
    expose:
      - '8081'
    ports:
      - '127.0.0.1:${APP_API_PORT:-8081}:8081'
    env_file:
      - ./.env
    environment:
      - APP_NAME=app-api
      - APP_PORT=8081
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_LOGIN_ALIYUN_VERIFY_DISABLED=${APP_LOGIN_ALIYUN_VERIFY_DISABLED:-false}
      # 配置隔离映射
      - JWT_EXPIRATION_IN=${APP_JWT_EXPIRATION_IN}
      - JWT_REFRESH_EXPIRATION_IN=${APP_JWT_REFRESH_EXPIRATION_IN}
      - JWT_JWT_AUD=${APP_JWT_JWT_AUD}
      - JWT_JWT_ISSUER=${APP_JWT_ISSUER}
      - UPLOAD_LOCAL_DIR=${UPLOAD_LOCAL_DIR:-/app/uploads/public}
      - UPLOAD_TMP_DIR=${UPLOAD_TMP_DIR:-/app/uploads/tmp}
      - UPLOAD_LOCAL_URL_PREFIX=${UPLOAD_LOCAL_URL_PREFIX:-/files}
      - UPLOAD_MAX_FILE_SIZE=${APP_UPLOAD_MAX_FILE_SIZE}
      - REDIS_NAMESPACE=${APP_REDIS_NAMESPACE}
      - APP_VERSION=${APP_APP_VERSION}
      # 日志路径 (区分项目)
      - LOG_PATH=/app/logs/app
      # 控制台日志级别
      - LOG_CONSOLE_LEVEL=${LOG_CONSOLE_LEVEL}
    volumes:
      - ${HOST_UPLOADS_DIR:-es-server-uploads}:/app/uploads
      - ${HOST_LOGS_DIR:-es-server-logs}:/app/logs
      - ${HOST_APP_SECRETS_DIR:-es-app-server-secrets}:/app/secrets
      - /tmp
    networks:
      - 1panel-network # 使用外部网络，确保 DNS 解析稳定

  # Web 前端服务
  admin:
    image: es-admin-web-ele:${SERVER_VERSION}
    container_name: es-admin
    # 强制只使用本地镜像，不拉取
    pull_policy: never
    restart: unless-stopped
    # 日志轮转
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    expose:
      - '8080'
    ports:
      - '127.0.0.1:8082:8080'
    networks:
      - 1panel-network # 使用外部网络，确保能稳定解析 admin-server 服务名

  # Web App服务
  app:
    image: es-app-web:${SERVER_VERSION}
    container_name: es-app
    # 强制只使用本地镜像，不拉取
    pull_policy: never
    restart: unless-stopped
    # 日志轮转
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    expose:
      - '8080'
    ports:
      - '127.0.0.1:8083:8080'
    networks:
      - 1panel-network # 使用外部网络，保持网络配置一致

  # 统一文件静态服务
  files:
    image: nginx:1.29-alpine
    container_name: es-files
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    expose:
      - '8080'
    ports:
      - '127.0.0.1:8084:8080'
    volumes:
      - ${HOST_UPLOADS_DIR:-es-server-uploads}:/srv/uploads:ro
      - ./deploy/files-nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - 1panel-network

networks:
  # 使用 1Panel 外部网络，所有服务在同一网络中，DNS 解析更稳定
  1panel-network:
    external: true
    name: 1panel-network # 若你的 1Panel 网络名称不是这个，替换为自己查到的

volumes:
  es-server-logs:
    driver: local
  es-server-uploads:
    driver: local
  es-admin-server-secrets:
    driver: local
  es-app-server-secrets:
    driver: local
